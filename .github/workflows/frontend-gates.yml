name: Frontend gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enforce canonical source and anti-drift context
        run: node tools/preflight.mjs --mode ci
      - name: Run deterministic assignment evaluator tests
        run: node tools/assignment-engine.test.mjs
      - name: Validate support product combobox accessibility
        run: node tools/support-product-combobox-a11y.test.mjs
      - name: Validate legal page precache contract
        run: node tools/sw-legal-shells.test.mjs
      - name: Enforce assignment test ownership
        run: node tools/ci-assignment-ownership.test.mjs
      - name: Validate final Pages artifact
        run: node tools/frontend-gates.mjs .
      - name: Scan forbidden secrets and local config
        run: bash tools/secret-gate.sh .
      - name: Test secret scanner fail-closed behavior
        run: bash tools/secret-gate-test.sh
      - name: Reject real-looking PII fixtures
        run: node tools/pii-gate.mjs .
      - name: Keep company optional in public support
        run: node tools/support-company-gate.mjs .
      - name: Block stored XSS in ticket renderers
        run: node tools/xss-gate.mjs .
      - name: Block anonymous CRM disclosure in support Edge (U1)
        run: node tools/edge-anon-response-gate.mjs .
      - name: Block client-side role provisioning (U2)
        run: node tools/client-role-write-gate.mjs .
      - name: Enforce private/safe storage upload contract (U5)
        run: node tools/storage-safety-gate.mjs .
      - name: Enforce Turnstile config before production (V2-7)
        run: node tools/turnstile-deploy-gate.mjs .
      - name: Run upload-contract unit tests (V2-10)
        run: node --experimental-strip-types tools/run-contract-tests.mjs .
      - name: Enforce admin UX functional closeout (U10)
        run: node tools/admin-ux-u10.test.mjs
      - name: TC-U15A-1 ticket scope contract
        run: node tools/ticket-scope.test.mjs
      - name: TC-U15A-1 canonical navigation
        run: node tools/u15a1-navigation.test.mjs

      - name: Verify dashboard resilience utilities (U15A-2)
        run: node tools/dashboard-resilience.test.mjs
      - name: Verify supervision tray and agents resilience (U15A-2)
        run: node tools/u15a2-supervision.test.mjs
      - name: TC-U15A-2 agent summary contracts
        run: node tools/u15a2-agent-summary.test.mjs
      - name: TC-U15A-3 dashboard and audit contracts
        run: node tools/u15a3-dashboard-admin-bitacora.test.mjs
      - name: TC-U15B-1 clients machine filter
        run: node tools/u15b1-clients-machines-filters.test.mjs
      - name: TC-U15B-2 client creation contract
        run: node tools/u15b2-client-create-catalog-agent.test.mjs
      - name: TC-U15C-A safe consolidation boundary
        run: node tools/u15c-frontend-safe-contract.test.mjs
      - name: TC-U15C-D consolidation RPC contract
        run: node tools/u15d-consolidation-rpc-contract.test.mjs
      - name: TC-SEC-RLS-MATCH contract
        run: node tools/tc-sec-rls-match-contract.test.mjs
      - name: TC-SEC-SD-GRANTS contract
        run: node tools/tc-sec-sd-grants-contract.test.mjs
      - name: Static accessibility gate
        run: node tools/a11y-static-gate.mjs
      - name: Enforce pre-staging AuthZ reconciliation (U11)
        run: node tools/prestaging-authz-contract.test.mjs
      - name: Enforce SECURITY DEFINER inventory (U12A)
        run: node tools/security-definer-contract.test.mjs
      - name: Enforce synthetic staging seed contract (U12B)
        run: node tools/staging-synthetic-seed-contract.test.mjs
      - name: Reject whitespace and conflict-marker errors
        run: git diff --check HEAD^ HEAD
