name: Frontend gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - name: Validate final Pages artifact
        run: node tools/frontend-gates.mjs .
      - name: Scan forbidden secrets and local config
        run: bash tools/secret-gate.sh .
      - name: Reject real-looking PII fixtures
        run: node tools/pii-gate.mjs .
      - name: Reject whitespace and conflict-marker errors
        run: git diff --check HEAD^ HEAD
