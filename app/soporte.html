<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ticket Core Demo · Soporte</title>
  <link rel="icon" href="../favicon.ico">
  <style>
    :root{color-scheme:dark;--bg:#071018;--panel:#101b29;--text:#f5f7fb;--muted:#aab7c7;--line:#24364a;--accent:#6ee7ff;--ok:#7cf29a}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#071018;color:var(--text)}
    header{padding:20px;border-bottom:1px solid rgba(255,255,255,.08);background:#0d1724}
    .wrap{max-width:880px;margin:0 auto}
    .top{display:flex;justify-content:space-between;gap:14px;align-items:center;flex-wrap:wrap}
    h1{margin:0;font-size:26px}
    nav a{color:var(--accent);text-decoration:none;margin-left:12px;font-weight:750}
    main{padding:28px 20px 72px}
    .card{background:#101b29;border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.24)}
    label{display:block;margin:14px 0 6px;color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:.06em}
    input,select,textarea{width:100%;padding:12px 13px;border-radius:13px;border:1px solid var(--line);background:#071018;color:var(--text);font:inherit}
    textarea{min-height:120px;resize:vertical}
    button{margin-top:16px;border:0;border-radius:999px;padding:12px 18px;background:var(--accent);color:#061018;font-weight:850;cursor:pointer}
    .notice{margin-top:16px;padding:13px 14px;border-radius:16px;background:rgba(124,242,154,.08);border:1px solid rgba(124,242,154,.25);color:#d8ffe2;display:none}
    .muted{color:var(--muted);line-height:1.55}
    .demo{position:fixed;left:8px;bottom:8px;z-index:9999;font:12px/1 system-ui;background:#0a1018cc;color:#fff;padding:6px 10px;border-radius:8px;opacity:.84}
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <h1>Soporte demo</h1>
      <nav>
        <a href="index.html">Inicio</a>
        <a href="tickets.html">Tickets</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="estado.html">Estado</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="wrap">
      <section class="card">
        <p class="muted">Formulario público de demostración. No envía datos a ningún servidor ni crea tickets reales.</p>
        <form id="demoForm">
          <label>Nombre</label>
          <input name="nombre" value="Cliente Demo">
          <label>Correo</label>
          <input name="correo" value="cliente.demo@example.test">
          <label>Prioridad</label>
          <select name="prioridad">
            <option>Media</option>
            <option>Alta</option>
            <option>Baja</option>
          </select>
          <label>Mensaje</label>
          <textarea name="mensaje">Necesito ayuda con una prueba demo de Ticket Core.</textarea>
          <button type="submit">Simular envío</button>
        </form>
        <div id="notice" class="notice">Modo demo: no se envió nada. Se simuló la creación de un ticket ficticio.</div>
      </section>
    </div>
  </main>
  <div class="demo">Demo pública · datos ficticios</div>
  <script>
    document.getElementById("demoForm").addEventListener("submit", event => {
      event.preventDefault();
      document.getElementById("notice").style.display = "block";
    });
  </script>
</body>
</html>
