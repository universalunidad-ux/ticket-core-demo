<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ticket Core · App Demo</title>
  <link rel="icon" href="../favicon.ico">
  <style>
    :root{color-scheme:dark;--bg:#071018;--panel:#101b29;--text:#f5f7fb;--muted:#aab7c7;--line:#24364a;--accent:#6ee7ff}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#071018;color:var(--text)}
    main{max-width:980px;margin:0 auto;padding:42px 20px}
    h1{margin:0 0 10px;font-size:34px}
    p{color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:24px}
    a{display:block;text-decoration:none;color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:18px;background:#101b29}
    a:hover{border-color:rgba(110,231,255,.55)}
    b{display:block;color:var(--accent);margin-bottom:6px}
    span{color:var(--muted);font-size:14px}
    .demo{position:fixed;left:8px;bottom:8px;z-index:9999;font:12px/1 system-ui;background:#0a1018cc;color:#fff;padding:6px 10px;border-radius:8px;opacity:.84}
    @media(max-width:720px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main>
    <h1>Ticket Core · App Demo</h1>
    <p>Navegación pública de demostración. Datos ficticios, sin backend real.</p>
    <div class="grid">
      <a href="tickets.html"><b>Tickets</b><span>Bandeja principal.</span></a>
      <a href="dashboard.html"><b>Dashboard</b><span>Métricas demo.</span></a>
      <a href="soporte.html"><b>Soporte</b><span>Formulario demo.</span></a>
      <a href="estado.html"><b>Estado</b><span>Status demo.</span></a>
    </div>
  </main>
  <div class="demo">Demo pública · datos ficticios</div>
</body>
</html>
