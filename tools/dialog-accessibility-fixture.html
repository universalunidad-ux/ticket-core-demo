<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Dialog accessibility fixture</title>
  <style>
    [hidden]{display:none!important}
    body{font:16px system-ui;margin:0;padding:24px}
    .overlay{position:fixed;inset:0;display:grid;place-items:center;background:#0008}
    .dialog{display:grid;gap:12px;min-width:320px;padding:24px;background:white;color:#111;border-radius:16px}
  </style>
</head>
<body>
  <main id="fixtureBackground">
    <h1>Fixture de lifecycle compartido</h1>
    <button id="openA" type="button">Abrir diálogo A</button>
    <a id="backgroundLink" href="#background">Fondo</a>
  </main>

  <div class="overlay" id="dialogA" role="dialog" aria-modal="true" aria-labelledby="dialogATitle" aria-hidden="true" tabindex="-1" hidden>
    <div class="dialog">
      <h2 id="dialogATitle">Diálogo A</h2>
      <button id="aFirst" type="button">Primer control A</button>
      <input id="aInput" aria-label="Campo A">
      <button id="openB" type="button">Abrir diálogo B</button>
      <button id="closeA" type="button">Cerrar A</button>
    </div>
  </div>

  <div class="overlay" id="dialogB" role="dialog" aria-modal="true" aria-labelledby="dialogBTitle" aria-hidden="true" tabindex="-1" hidden>
    <div class="dialog">
      <h2 id="dialogBTitle">Diálogo B</h2>
      <button id="bClose" type="button">Cerrar B</button>
      <a id="bOriginal" href="#original">Abrir original</a>
    </div>
  </div>

  <script type="module">
    import { openDialog, closeDialog } from "../app/global.js";
    const byId=id=>document.getElementById(id);
    const closeA=()=>closeDialog(byId("dialogA"));
    const closeB=()=>closeDialog(byId("dialogB"));
    byId("openA").addEventListener("click",event=>openDialog(byId("dialogA"),{trigger:event.currentTarget,initialFocus:byId("aFirst"),onCloseRequest:closeA}));
    byId("closeA").addEventListener("click",closeA);
    byId("dialogA").addEventListener("click",event=>{if(event.target===event.currentTarget)closeA()});
    byId("openB").addEventListener("click",event=>openDialog(byId("dialogB"),{trigger:event.currentTarget,initialFocus:byId("bClose"),onCloseRequest:closeB}));
    byId("bClose").addEventListener("click",closeB);
    byId("dialogB").addEventListener("click",event=>{if(event.target===event.currentTarget)closeB()});
  </script>
</body>
</html>
